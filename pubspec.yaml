name: janarym
description: "Janarym - Voice AI Assistant for visually impaired users"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any

  # Camera & Media
  camera: any
  image: any

  # Audio & Speech
  record: any
  audioplayers: any
  flutter_tts: any
  speech_to_text: any

  # Bluetooth
  flutter_blue_plus: any

  # Networking
  http: any
  dio: any
  connectivity_plus: any

  # Location
  geolocator: any
  geocoding: any

  # State Management
  provider: any

  # Storage & Preferences
  shared_preferences: any

  # Haptics & Vibration
  vibration: any

  # Permissions
  permission_handler: any

  # Utilities
  uuid: any
  intl: any
  cupertino_icons: any
  path_provider: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
